<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import | Smith Tax Tracker</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Smith Enterprises Tax Tracker</h1>
      <p data-employee-name></p>
    </div>
    
<nav class="app-nav">
  <button data-nav="dashboard">Dashboard</button>
  <button data-nav="clients">Clients</button>
  <button
    data-nav="intakes"
    data-roles="administrator,office_manager,senior_preparer,preparer,receptionist,bookkeeper,read_only"
  >
    Intakes
  </button>

  <button data-nav="reports" data-roles="administrator,office_manager,senior_preparer,preparer,bookkeeper,read_only">Reports</button>
  <button data-nav="employees" data-roles="administrator,office_manager">Employees</button>
  <button data-nav="import" data-roles="administrator,office_manager">Import</button>
  <button data-nav="settings">Settings</button>
  <button data-logout>Sign Out</button>
</nav>

  </header>

  <main class="app-container">
    <section class="page-heading">
      <div>
        <h2>Import</h2>
        <p>Import sanitized client records from a CSV file.</p>
      </div>
    </section>
    
<section class="panel">
  <div class="panel-heading"><h3>Client CSV import</h3></div>
  <p>Expected columns: client_number, first_name, last_name, business_name, phone, email, preferred_contact_method, client_type, active, notes.</p>
  <input id="csv-file" type="file" accept=".csv,text/csv">
  <div class="form-actions">
    <button id="preview-import">Preview</button>
    <button id="run-import" class="primary" disabled>Import clients</button>
  </div>
  <p id="import-message" class="page-message"></p>
  <div class="table-wrapper">
    <table>
      <thead id="preview-head"></thead>
      <tbody id="preview-body"></tbody>
    </table>
  </div>
</section>

  </main>
  <script type="module" src="./js/import.js"></script>
</body>
</html>
