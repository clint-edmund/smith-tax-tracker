<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Workspace | Smith Tax Tracker</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Smith Enterprises Tax Tracker</h1>
      <p data-employee-name></p>
    </div>
    
<nav class="app-nav">
  <button data-nav="dashboard">Dashboard</button>
  <button data-nav="clients">Clients</button>
  <button data-nav="reports" data-roles="administrator,office_manager,senior_preparer,preparer,bookkeeper,read_only">Reports</button>
  <button data-nav="employees" data-roles="administrator,office_manager">Employees</button>
  <button data-nav="import" data-roles="administrator,office_manager">Import</button>
  <button data-nav="settings">Settings</button>
  <button data-logout>Sign Out</button>
</nav>

  </header>

  <main class="app-container">
    <section class="page-heading">
      <div>
        <h2>Client Workspace</h2>
        <p>Manage the client profile, returns, statuses, and payments.</p>
      </div>
    </section>
    
<p id="page-message" class="page-message"></p>

<section class="panel">
  <div class="panel-heading"><h3>Client profile</h3></div>
  <form id="client-form" class="form-grid">
    <input id="client-id" type="hidden">
    <label>Client number<input id="client-number" required></label>
    <label>Client type<select id="client-type"><option>Individual</option><option>Business</option><option>Nonprofit</option><option>Other</option></select></label>
    <label>First name<input id="first-name"></label>
    <label>Last name<input id="last-name"></label>
    <label class="span-2">Business name<input id="business-name"></label>
    <label>Phone<input id="phone" type="tel"></label>
    <label>Email<input id="email" type="email"></label>
    <label>Preferred contact<select id="preferred-contact"><option value="">Not selected</option><option>Phone</option><option>Email</option><option>Text</option></select></label>
    <label>Status<select id="client-active"><option value="true">Active</option><option value="false">Inactive</option></select></label>
    <label class="span-2">Notes<textarea id="client-notes" rows="3"></textarea></label>
    <div class="form-actions span-2"><button type="submit" class="primary" data-roles="administrator,office_manager,senior_preparer,preparer,receptionist">Save client</button></div>
  </form>
</section>

<section id="returns-panel" class="panel hidden">
  <div class="panel-heading">
    <h3>Client returns</h3>
    <button id="new-return" data-roles="administrator,office_manager,senior_preparer,preparer">New return</button>
  </div>
  <div class="table-wrapper">
    <table>
      <thead><tr><th>Year</th><th>Type</th><th>Status</th><th>Date received</th><th>Payment</th><th>Balance</th></tr></thead>
      <tbody id="returns-body"></tbody>
    </table>
  </div>
</section>

<section id="return-editor" class="panel hidden">
  <div class="panel-heading"><h3>Return details</h3></div>
  <form id="return-form" class="form-grid">
    <input id="return-id" type="hidden">
    <label>Tax year<input id="tax-year" type="number" min="2000" max="2100" required></label>
    <label>Return type<select id="return-type"><option>Federal and State</option><option>Federal Only</option><option>State Only</option><option>Business</option><option>Amended</option><option>Other</option></select></label>
    <label>Assigned preparer<select id="assigned-preparer"><option value="">Unassigned</option></select></label>
    <label>Date received<input id="date-received" type="date"></label>
    <label>Delivery method<select id="delivery-method"><option value="">Not selected</option><option>Walk-in</option><option>Portal</option><option>Email</option><option>Mail</option><option>Other</option></select></label>
    <label>Expected completion<input id="expected-completion" type="date"></label>
    <label>Follow-up date<input id="follow-up-date" type="date"></label>
    <label>Preparation fee<input id="preparation-fee" type="number" min="0" step="0.01" value="0"></label>
    <label>Additional fees<input id="additional-fees" type="number" min="0" step="0.01" value="0"></label>
    <label>Discount<input id="discount" type="number" min="0" step="0.01" value="0"></label>
    <label>Amount paid<input id="amount-paid" readonly></label>
    <label>Balance due<input id="balance-due" readonly></label>
    <label class="span-2">Return notes<textarea id="return-notes" rows="3"></textarea></label>
    <div class="form-actions span-2"><button type="submit" class="primary" data-roles="administrator,office_manager,senior_preparer,preparer">Save return</button></div>
  </form>
</section>

<section id="workflow-grid" class="content-grid two-column hidden">
  <article class="panel">
    <div class="panel-heading"><h3>Status workflow</h3></div>
    <form id="status-form" class="stack-form">
      <label>New status<select id="new-status">
        <option>Documents Received</option><option>Initial Review</option>
        <option>Missing Information</option><option>Waiting for Client</option>
        <option>Ready for Preparation</option><option>In Preparation</option>
        <option>Ready for Quality Review</option><option>Corrections Required</option>
        <option>Ready for Client Signature</option><option>Ready to File</option>
        <option>E-Filed</option><option>Federal Accepted</option><option>State Accepted</option>
        <option>Rejected</option><option>Amendment Required</option>
        <option>Completed</option><option>On Hold</option><option>Cancelled</option>
      </select></label>
      <label>Follow-up date<input id="status-follow-up" type="date"></label>
      <label>Note<textarea id="status-note" rows="3"></textarea></label>
      <button type="submit" class="primary" data-roles="administrator,office_manager,senior_preparer,preparer,receptionist">Update status</button>
    </form>
    <div class="timeline" id="status-history"></div>
  </article>

  <article class="panel">
    <div class="panel-heading"><h3>Payments</h3></div>
    <form id="payment-form" class="stack-form">
      <label>Payment date<input id="payment-date" type="date" required></label>
      <label>Amount<input id="payment-amount" type="number" min="0.01" step="0.01" required></label>
      <label>Method<select id="payment-method"><option value="">Not selected</option><option>Cash</option><option>Check</option><option>Credit Card</option><option>Debit Card</option><option>ACH</option><option>Other</option></select></label>
      <label>Reference<input id="payment-reference"></label>
      <label>Notes<textarea id="payment-notes" rows="3"></textarea></label>
      <button type="submit" class="primary" data-roles="administrator,office_manager,senior_preparer,preparer,receptionist,bookkeeper">Record payment</button>
    </form>
    <div class="timeline" id="payment-history"></div>
  </article>
</section>

  </main>
  <script type="module" src="./js/client.js"></script>
</body>
</html>
