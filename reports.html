<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports | Smith Tax Tracker</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Smith Enterprises Tax Tracker</h1>
      <p data-employee-name></p>
    </div>
    
<nav class="app-nav">
  <button data-nav="dashboard">Dashboard</button>
  <button data-nav="clients">Clients</button>
  <button data-nav="reports">Reports</button>
  <button data-nav="employees" data-admin-only>Employees</button>
  <button data-nav="import" data-admin-only>Import</button>
  <button data-nav="settings">Settings</button>
  <button data-logout>Sign Out</button>
</nav>

  </header>

  <main class="app-container">
    <section class="page-heading">
      <div>
        <h2>Reports</h2>
        <p>Operational and financial summaries based on current tracker data.</p>
      </div>
    </section>
    
<section class="toolbar">
  <select id="report-type">
    <option value="balances">Outstanding balances</option>
    <option value="followups">Overdue follow-ups</option>
    <option value="waiting">Waiting for client</option>
    <option value="completed">Completed returns</option>
    <option value="revenue">Payments received</option>
  </select>
  <input id="start-date" type="date">
  <input id="end-date" type="date">
  <button id="run-report" class="primary">Run report</button>
  <button id="export-report">Export CSV</button>
</section>
<section class="kpi-grid">
  <article class="kpi-card"><span>Rows</span><strong id="report-count">0</strong></article>
  <article class="kpi-card"><span>Total amount</span><strong id="report-total">$0.00</strong></article>
</section>
<section class="panel">
  <p id="report-message" class="page-message"></p>
  <div class="table-wrapper">
    <table>
      <thead id="report-head"></thead>
      <tbody id="report-body"></tbody>
    </table>
  </div>
</section>

  </main>
  <script type="module" src="./js/reports.js"></script>
</body>
</html>
