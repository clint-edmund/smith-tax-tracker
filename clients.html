<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clients | Smith Tax Tracker</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Smith Enterprises Tax Tracker</h1>
      <p data-employee-name></p>
    </div>
    
<nav class="app-nav">
  <button data-nav="dashboard">Dashboard</button>
  <button data-nav="clients">Clients</button>
  <button data-nav="reports" data-roles="administrator,office_manager,senior_preparer,preparer,bookkeeper,read_only">Reports</button>
  <button data-nav="employees" data-roles="administrator,office_manager">Employees</button>
  <button data-nav="import" data-roles="administrator,office_manager">Import</button>
  <button data-nav="settings">Settings</button>
  <button data-logout>Sign Out</button>
</nav>

  </header>

  <main class="app-container">
    <section class="page-heading">
      <div>
        <h2>Clients</h2>
        <p>Search, filter, open, and create client records.</p>
      </div>
    </section>
    
<section class="toolbar">
  <input id="client-search" type="search" placeholder="Search name, client number, phone, or email">
  <select id="type-filter">
    <option value="">All types</option>
    <option>Individual</option><option>Business</option>
    <option>Nonprofit</option><option>Other</option>
  </select>
  <select id="active-filter">
    <option value="">All statuses</option>
    <option value="true">Active</option>
    <option value="false">Inactive</option>
  </select>
  <button id="add-client" class="primary" data-roles="administrator,office_manager,senior_preparer,preparer,receptionist">Add client</button>
</section>

<section class="panel">
  <div class="panel-heading">
    <h3>Client directory</h3>
    <strong id="client-count">0 clients</strong>
  </div>
  <p id="clients-message" class="page-message"></p>
  <div class="table-wrapper">
    <table>
      <thead><tr>
        <th>Client #</th><th>Name</th><th>Type</th>
        <th>Phone</th><th>Email</th><th>Status</th><th>Returns</th>
      </tr></thead>
      <tbody id="clients-body"></tbody>
    </table>
  </div>
</section>

  </main>
  <script type="module" src="./js/clients.js"></script>
</body>
</html>
