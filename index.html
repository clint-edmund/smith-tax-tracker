<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Smith Tax Tracker</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel">
      <div class="brand-mark">SE</div>
      <h1>Smith Enterprises</h1>
      <p class="muted">Tax Return Operations Tracker</p>

      <form id="login-form">
        <label for="email">Business email</label>
        <input id="email" type="email" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required>

        <button type="submit" class="primary wide">Sign In</button>
      </form>

      <p id="login-message" class="page-message" role="alert"></p>
      <p class="security-note">Authorized Smith Enterprises personnel only.</p>
    </section>
  </main>
  <script type="module" src="./js/login.js"></script>
</body>
</html>
